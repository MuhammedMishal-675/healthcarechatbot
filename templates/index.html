<!DOCTYPE html>
<html>
<head>
    <title>Healthcare AI Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f8;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 700px;
            margin: auto;
        }

        .header {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
            background: white;
            text-align: center;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 75%;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            line-height: 1.5;
        }

        .user {
            align-self: flex-end;
            background: #000;
            color: white;
        }

        .bot {
            align-self: flex-start;
            background: #e4e6eb;
            color: black;
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
            background: white;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 12px 15px;
            border: none;
            background: black;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        🩺 Healthcare AI Assistant
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Describe your symptom...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

function sendMessage() {
    let inputField = document.getElementById("userInput");
    let message = inputField.value.trim();

    if(message === "") return;

    let chatBox = document.getElementById("chatBox");

    // User message
    let userDiv = document.createElement("div");
    userDiv.className = "message user";
    userDiv.innerText = message;
    chatBox.appendChild(userDiv);

    // Clear input
    inputField.value = "";

    // Scroll down
    chatBox.scrollTop = chatBox.scrollHeight;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {

        let botDiv = document.createElement("div");
        botDiv.className = "message bot";
        botDiv.innerText = data.response;

        chatBox.appendChild(botDiv);

        // Auto scroll
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

// ✅ ENTER KEY SUPPORT
document.getElementById("userInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
});

</script>

</body>
</html>
